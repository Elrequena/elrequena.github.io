<app-circuit-background />

<app-header [darkMode]="darkMode()" (toggleTheme)="toggleTheme()" />

<main class="content">
  <app-hero />

  <div class="projects-grid">
    @for (project of projects(); track project.name) {
      <app-project-card [project]="project" />
    }
  </div>

  <app-footer />
</main>
